<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Auction">
<title>Auction Timer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    overflow:hidden;
    padding:env(safe-area-inset-top,36px) 12px env(safe-area-inset-bottom,10px);
  }
  #status {
    font-size:14px;
    color:#555;
    height:20px;
    text-align:center;
    padding-top:4px;
  }
  #middle {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    padding:6px 0;
  }
  #buy-btn {
    width:100%;
    height:100%;
    border-radius:36px;
    border:7px solid #30d158;
    background:#0a1f0a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding-top:0;
    cursor:pointer;
    transition:transform 0.12s, border-color 0.4s, background 0.4s;
    user-select:none;
    -webkit-user-select:none;
    position:relative;
  }
  #buy-btn:active { transform:scale(0.98); }
  #btn-action {
    font-size:60px;
    font-weight:600;
    transition:color 0.4s;
    color:#30d158;
    line-height:1;
    margin-bottom:6vw;
    text-align:center;
    width:100%;
  }
  #amount-number {
    font-size:239px;
    font-weight:200;
    letter-spacing:-8px;
    color:#fff;
    line-height:0.9;
    transition:color 0.4s;
  }
  #amount-unit {
    font-size:39px;
    font-weight:300;
    color:#aaa;
    letter-spacing:1px;
    line-height:1;
    transition:color 0.4s;
    margin-top:6px;
  }
  #bottom {
    display:flex;
    justify-content:center;
    padding-bottom:10px;
    margin-bottom:20px;
  }
  .ctrl-btn {
    background:#222;
    border:1px solid #444;
    border-radius:32px;
    color:#fff;
    font-size:26px;
    padding:18px 80px;
    cursor:pointer;
    font-family:inherit;
  }
  .ctrl-btn:active { opacity:0.5; }
  canvas {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:999;
  }
  #fp-overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:1000;
  }
  #fp-wrap {
    position:absolute;
    display:none;
    align-items:center;
    justify-content:center;
    transform:translate(-50%,-50%);
  }
  #fp-ripple1, #fp-ripple2, #fp-ripple3 {
    position:absolute;
    border-radius:50%;
    border:3px solid #ffd60a;
    opacity:0;
    width:120px; height:120px;
    pointer-events:none;
  }
  #fp-svg {
    width:110px;
    height:110px;
    opacity:0;
    filter:drop-shadow(0 0 12px #ffd60a);
  }
</style>
</head>
<body>

<div id="status"></div>

<div id="middle">
  <div id="buy-btn" onclick="handleBtn(event)">
    <div id="btn-action">Start Auction</div>
    <div id="amount-number">20</div>
    <div id="amount-unit">million</div>
  </div>
</div>

<div id="bottom">
  <button class="ctrl-btn" onclick="resetTimer()">Reset</button>
</div>

<canvas id="fw"></canvas>

<div id="fp-overlay">
  <div id="fp-wrap">
    <div id="fp-ripple1"></div>
    <div id="fp-ripple2"></div>
    <div id="fp-ripple3"></div>
    <svg id="fp-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#ffd60a" stroke-linecap="round">
      <path stroke-width="2.8" d="M50 12 C28 12 14 28 14 50 C14 72 28 88 50 88 C72 88 86 72 86 50"/>
      <path stroke-width="2.8" d="M50 22 C33 22 22 35 22 50 C22 65 30 78 44 83"/>
      <path stroke-width="2.8" d="M50 32 C38 32 30 40 30 50 C30 60 35 70 44 75"/>
      <path stroke-width="2.8" d="M50 32 C62 32 70 40 70 50 C70 63 62 74 50 78 C44 80 38 79 33 76"/>
      <path stroke-width="2.8" d="M50 42 C44 42 38 46 38 52 C38 60 44 66 50 68 C56 66 62 60 62 52 C62 46 56 42 50 42Z"/>
      <path stroke-width="2.8" d="M50 12 C60 12 68 16 74 22"/>
      <path stroke-width="2.8" d="M78 30 C82 36 86 43 86 50 C86 58 83 66 78 72"/>
      <path stroke-width="2.8" d="M56 83 C63 80 70 74 74 66"/>
    </svg>
  </div>
</div>

<script>
const START=20, STEPS=20;
let current=START, running=false, bought=false, timeout=null;
let particles=[], animFrame=null, fwActive=false;

function easeInterval(step){
  const m=START-step;
  const t=Math.min(step,STEPS-1)/(STEPS-1);
  const base=700+t*t*700;
  return (m>=8&&m<=14)?base+150:base;
}

function fmt(m){ return m<=0?'0':''+m; }

function setAmountColor(m){
  document.getElementById('amount-number').style.color='#fff';
}

function render(){
  document.getElementById('amount-number').textContent=fmt(current);
  setAmountColor(current);
}

function applyTheme(theme){
  const b=document.getElementById('buy-btn');
  const act=document.getElementById('btn-action');
  const unit=document.getElementById('amount-unit');
  if(theme==='idle'){
    b.style.borderColor='#30d158'; b.style.background='#0a1f0a';
    act.style.color='#30d158'; act.textContent='Start Auction';
    unit.style.color='#aaa';
  } else if(theme==='running'){
    b.style.borderColor='#ff9f0a'; b.style.background='#1f140a';
    act.style.color='#ff9f0a'; act.textContent='BUY';
    unit.style.color='#aaa';
  } else if(theme==='sold'){
    b.style.borderColor='#5ac8fa'; b.style.background='#0a1a2a';
    act.style.color='#5ac8fa'; act.textContent='SOLD!';
    document.getElementById('amount-number').style.color='#5ac8fa';
    unit.style.color='#5ac8fa88';
  } else if(theme==='nosale'){
    b.style.borderColor='#888'; b.style.background='#111';
    act.style.color='#888'; act.textContent='No Sale';
    document.getElementById('amount-number').style.color='#555';
    unit.style.color='#44444488';
  }
}

function tick(step){
  if(!running) return;
  current--;
  render();
  if(current<=0){
    running=false;
    document.getElementById('status').textContent='no sale.';
    applyTheme('nosale');
    return;
  }
  timeout=setTimeout(()=>tick(step+1), easeInterval(step));
}

function startTimer(){
  if(running||bought||current<=0) return;
  running=true;
      document.getElementById('status').textContent='';

  applyTheme('running');
  timeout=setTimeout(()=>tick(0), easeInterval(0));
}

function handleBtn(e){
  if(!running&&!bought){ startTimer(); return; }
  if(running){
    clearTimeout(timeout);
    running=false; bought=true;
    document.getElementById('status').textContent='';
    applyTheme('sold');
    showFingerprint(e);
    launchFireworks();
  }
}

function resetTimer(){
  clearTimeout(timeout);
  cancelAnimationFrame(animFrame);
  fwActive=false; particles=[];
  const cv=document.getElementById('fw');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
  running=false; bought=false; current=START;
  document.getElementById('status').textContent='';
  document.getElementById('amount-number').style.color='#fff';
  document.getElementById('amount-unit').style.color='#aaa';
  applyTheme('idle');
  render();
}

function showFingerprint(e){
  const wrap=document.getElementById('fp-wrap');
  const fpSvg=document.getElementById('fp-svg');
  const r1=document.getElementById('fp-ripple1');
  const r2=document.getElementById('fp-ripple2');
  const r3=document.getElementById('fp-ripple3');
  let x,y;
  if(e&&e.changedTouches&&e.changedTouches.length){
    x=e.changedTouches[0].clientX; y=e.changedTouches[0].clientY;
  } else if(e&&e.clientX){
    x=e.clientX; y=e.clientY;
  } else {
    x=window.innerWidth/2; y=window.innerHeight/2;
  }
  wrap.style.left=x+'px'; wrap.style.top=y+'px';
  wrap.style.display='flex';
  [r1,r2,r3].forEach(r=>{ r.style.transition='none'; r.style.opacity='0'; r.style.transform='scale(0)'; });
  fpSvg.style.transition='none'; fpSvg.style.opacity='0'; fpSvg.style.transform='scale(0.4)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fpSvg.style.transition='opacity 0.35s ease, transform 0.35s ease';
    fpSvg.style.opacity='1'; fpSvg.style.transform='scale(1)';
    [[r1,0,1.8],[r2,180,2.4],[r3,360,3.0]].forEach(([r,delay,scale])=>{
      setTimeout(()=>{
        r.style.transition='opacity 0.15s ease, transform 0.9s ease';
        r.style.opacity='0.8'; r.style.transform='scale(1)';
        setTimeout(()=>{
          r.style.transition='opacity 0.6s ease, transform 0.9s ease';
          r.style.opacity='0'; r.style.transform='scale('+scale+')';
        },150);
      },delay);
    });
    setTimeout(()=>{
      fpSvg.style.transition='opacity 1s ease';
      fpSvg.style.opacity='0';
      setTimeout(()=>{ wrap.style.display='none'; },1000);
    },2200);
  }));
}


  const cv=document.getElementById('fw');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  fwActive=true;
  for(let i=0;i<6;i++) setTimeout(()=>burst(cv),i*320);
  setTimeout(()=>{fwActive=false;},2800);
  animFrame=requestAnimationFrame(()=>drawFw(cv));
}

function burst(cv){
  const x=cv.width*0.2+Math.random()*cv.width*0.6;
  const y=cv.height*0.15+Math.random()*cv.height*0.45;
  const colors=['#5ac8fa','#30d158','#ffd60a','#ff9f0a','#bf5af2','#ff6b6b'];
  const c=colors[Math.floor(Math.random()*colors.length)];
  for(let i=0;i<40;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,alpha:1,color:c,r:2+Math.random()*2});
  }
}

function drawFw(cv){
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  particles=particles.filter(p=>p.alpha>0.02);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.vx*=0.97; p.alpha-=0.018;
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  if(particles.length>0||fwActive) animFrame=requestAnimationFrame(()=>drawFw(cv));
  else ctx.clearRect(0,0,cv.width,cv.height);
}

render(); applyTheme('idle');
</script>
</body>
</html>
