<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Spectrum">
<title>Spectrum</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    overflow:hidden;
    padding:env(safe-area-inset-top,36px) 12px env(safe-area-inset-bottom,10px);
  }
  #status {
    font-size:14px;
    color:#555;
    height:20px;
    text-align:center;
    padding-top:4px;
  }
  #middle {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    padding:6px 0;
  }
  #buy-btn {
    width:100%;
    height:100%;
    border-radius:36px;
    border:7px solid #30d158;
    background:#0a1f0a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform 0.12s, border-color 0.4s, background 0.4s;
    user-select:none;
    -webkit-user-select:none;
    position:relative;
    overflow:hidden;
  }
  #buy-btn:active { transform:scale(0.98); }
  #btn-action {
    font-size:60px;
    font-weight:600;
    transition:color 0.4s;
    color:#30d158;
    line-height:1;
    margin-bottom:6vw;
    text-align:center;
    width:100%;
  }
  #amount-number {
    font-size:239px;
    font-weight:200;
    letter-spacing:-8px;
    color:#fff;
    line-height:0.9;
  }
  #amount-unit {
    font-size:39px;
    font-weight:300;
    color:#aaa;
    letter-spacing:1px;
    line-height:1;
    transition:color 0.4s;
    margin-top:6px;
  }
  #bottom {
    display:flex;
    justify-content:center;
    padding-bottom:10px;
    margin-bottom:20px;
  }
  .ctrl-btn {
    background:#222;
    border:1px solid #444;
    border-radius:32px;
    color:#fff;
    font-size:26px;
    padding:18px 80px;
    cursor:pointer;
    font-family:inherit;
  }
  .ctrl-btn:active { opacity:0.5; }
</style>
</head>
<body>

<div id="status"></div>

<div id="middle">
  <div id="buy-btn">
    <div id="btn-action">Start Auction</div>
    <div id="amount-number">20</div>
    <div id="amount-unit">million</div>
  </div>
</div>

<div id="bottom">
  <button class="ctrl-btn" onclick="resetTimer()">Reset</button>
</div>

<canvas id="fw" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;"></canvas>
<canvas id="fp-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;"></canvas>

<script>
const START=20, STEPS=20;
let current=START, running=false, bought=false, timeout=null;
let particles=[], animFrame=null, fwActive=false;
let fpAnim=null;

/* Touch/click handler on the button */
const btn=document.getElementById('buy-btn');
btn.addEventListener('touchend', function(e){ e.preventDefault(); handleBtn(e); }, {passive:false});
btn.addEventListener('click', function(e){ handleBtn(e); });

function easeInterval(step){
  const m=START-step;
  const t=Math.min(step,STEPS-1)/(STEPS-1);
  const base=700+t*t*700;
  return (m>=8&&m<=14)?base+150:base;
}

function fmt(m){ return m<=0?'0':''+m; }

function render(){
  document.getElementById('amount-number').textContent=fmt(current);
}

function applyTheme(theme){
  const b=document.getElementById('buy-btn');
  const act=document.getElementById('btn-action');
  const unit=document.getElementById('amount-unit');
  if(theme==='idle'){
    b.style.borderColor='#30d158'; b.style.background='#0a1f0a';
    act.style.color='#30d158'; act.textContent='Start Auction';
    unit.style.color='#aaa';
    document.getElementById('amount-number').style.color='#fff';
  } else if(theme==='running'){
    b.style.borderColor='#ff9f0a'; b.style.background='#1f140a';
    act.style.color='#ff9f0a'; act.textContent='BUY';
    unit.style.color='#aaa';
  } else if(theme==='sold'){
    b.style.borderColor='#5ac8fa'; b.style.background='#0a1a2a';
    act.style.color='#5ac8fa'; act.textContent='SOLD!';
    unit.style.color='#5ac8fa88';
    document.getElementById('amount-number').style.color='#fff';
  } else if(theme==='nosale'){
    b.style.borderColor='#888'; b.style.background='#111';
    act.style.color='#888'; act.textContent='No Sale';
    unit.style.color='#55555588';
    document.getElementById('amount-number').style.color='#fff';
  }
}

function tick(step){
  if(!running) return;
  current--;
  render();
  if(current<=0){
    running=false;
    document.getElementById('status').textContent='';
    applyTheme('nosale');
    return;
  }
  timeout=setTimeout(()=>tick(step+1), easeInterval(step));
}

function startTimer(){
  if(running||bought||current<=0) return;
  running=true;
  document.getElementById('status').textContent='';
  applyTheme('running');
  timeout=setTimeout(()=>tick(0), easeInterval(0));
}

function handleBtn(e){
  if(!running&&!bought){ startTimer(); return; }
  if(running){
    clearTimeout(timeout);
    running=false; bought=true;
    document.getElementById('status').textContent='';
    applyTheme('sold');
    let x=window.innerWidth/2, y=window.innerHeight/2;
    if(e&&e.changedTouches&&e.changedTouches.length){
      x=e.changedTouches[0].clientX; y=e.changedTouches[0].clientY;
    } else if(e&&e.clientX){ x=e.clientX; y=e.clientY; }
    showFingerprint(x,y);
    launchFireworks();
  }
}

function resetTimer(){
  clearTimeout(timeout);
  cancelAnimationFrame(animFrame);
  cancelAnimationFrame(fpAnim);
  fwActive=false; particles=[];
  ['fw','fp-canvas'].forEach(id=>{
    const cv=document.getElementById(id);
    cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
  });
  running=false; bought=false; current=START;
  document.getElementById('status').textContent='';
  applyTheme('idle');
  render();
}

/* Fingerprint */
function showFingerprint(cx,cy){
  const cv=document.getElementById('fp-canvas');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const scale=0.7;
  const r=47, start=performance.now();
  const dur={fade:350,hold:3800,out:800};
  const total=dur.fade+dur.hold+dur.out;
  const ripples=[{delay:0,maxR:66},{delay:220,maxR:90},{delay:440,maxR:113}];

  function drawFP(alpha){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#ffd60a';
    ctx.lineWidth=2.6;
    ctx.lineCap='round';
    ctx.translate(cx,cy);
    ctx.scale(scale,scale);

    // core whorl center
    ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.stroke();

    // tightly spaced concentric arcs simulating ridge lines
    const ridges=[
      {r:10, s:-0.5, e:Math.PI+0.5},
      {r:16, s:-0.8, e:Math.PI+0.75},
      {r:22, s:-1.0, e:Math.PI+0.95},
      {r:28, s:-1.15, e:Math.PI+1.1},
      {r:34, s:-1.22, e:Math.PI+1.18},
      {r:40, s:-1.27, e:Math.PI+1.22},
      {r:46, s:-1.3,  e:Math.PI+1.26, gap:true, gapS:0.3, gapE:0.55},
      {r:52, s:-1.32, e:Math.PI+1.28},
      {r:58, s:-1.33, e:Math.PI+1.29, gap:true, gapS:-0.1, gapE:0.15},
      {r:64, s:-1.34, e:Math.PI+1.3},
      {r:70, s:-1.35, e:Math.PI+1.31},
      {r:76, s:-1.35, e:Math.PI+1.31, gap:true, gapS:0.6, gapE:0.85},
    ];

    ridges.forEach(a=>{
      if(a.gap){
        // draw arc in two segments skipping the gap
        ctx.beginPath(); ctx.arc(0,0,a.r,a.s,a.gapS); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,0,a.r,a.gapE,a.e); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(0,0,a.r,a.s,a.e); ctx.stroke();
      }
    });

    ctx.restore();
  }

  function drawRipple(elapsed, delay, maxR){
    const t=elapsed-delay;
    if(t<0) return;
    const prog=Math.min(t/600,1);
    const cr=maxR*prog;
    const alpha=0.9*(1-prog);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#ffd60a';
    ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.arc(cx,cy,cr,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  function frame(now){
    const elapsed=now-start;
    ctx.clearRect(0,0,cv.width,cv.height);
    let fpAlpha=0;
    if(elapsed<dur.fade) fpAlpha=elapsed/dur.fade;
    else if(elapsed<dur.fade+dur.hold) fpAlpha=1;
    else fpAlpha=1-((elapsed-dur.fade-dur.hold)/dur.out);
    fpAlpha=Math.max(0,Math.min(1,fpAlpha));
    drawFP(fpAlpha);
    ripples.forEach(rp=>drawRipple(elapsed,rp.delay,rp.maxR));
    if(elapsed<total+600) fpAnim=requestAnimationFrame(frame);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  fpAnim=requestAnimationFrame(frame);
}

/* Fireworks */
function launchFireworks(){
  const cv=document.getElementById('fw');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  fwActive=true;
  for(let i=0;i<6;i++) setTimeout(()=>burst(cv),i*320);
  setTimeout(()=>{fwActive=false;},2800);
  animFrame=requestAnimationFrame(()=>drawFw(cv));
}

function burst(cv){
  const x=cv.width*0.2+Math.random()*cv.width*0.6;
  const y=cv.height*0.15+Math.random()*cv.height*0.45;
  const colors=['#5ac8fa','#30d158','#ffd60a','#ff9f0a','#bf5af2','#ff6b6b'];
  const c=colors[Math.floor(Math.random()*colors.length)];
  for(let i=0;i<40;i++){
    const angle=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,alpha:1,color:c,r:2+Math.random()*2});
  }
}

function drawFw(cv){
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  particles=particles.filter(p=>p.alpha>0.02);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.vx*=0.97; p.alpha-=0.018;
    ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  if(particles.length>0||fwActive) animFrame=requestAnimationFrame(()=>drawFw(cv));
  else ctx.clearRect(0,0,cv.width,cv.height);
}

render(); applyTheme('idle');
</script>
</body>
</html>
